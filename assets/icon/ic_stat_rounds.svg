<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="1024" height="1024">
  <!--
    Notification icon: white segments on transparent background.
    Android requires single-color (white) icons for the status bar/notification shade.
    Pending segments use reduced opacity to hint at the "unpaid" state.
  -->

  <!-- Paid segments (0–3) — full white -->
  <path d="M 50 15 A 35 35 0 0 1 73.42 23.99"
        fill="none" stroke="#ffffff" stroke-width="10" stroke-linecap="round"/>
  <path d="M 80.31 32.5 A 35 35 0 0 1 84.23 57.28"
        fill="none" stroke="#ffffff" stroke-width="10" stroke-linecap="round"/>
  <path d="M 80.31 67.5 A 35 35 0 0 1 60.82 83.29"
        fill="none" stroke="#ffffff" stroke-width="10" stroke-linecap="round"/>
  <path d="M 50 85 A 35 35 0 0 1 26.58 76.01"
        fill="none" stroke="#ffffff" stroke-width="10" stroke-linecap="round"/>

  <!-- Pending segments (4–5) — white at 35% opacity -->
  <path d="M 19.69 67.5 A 35 35 0 0 1 15.77 42.72"
        fill="none" stroke="#ffffff" stroke-opacity="0.35" stroke-width="10" stroke-linecap="round"/>
  <path d="M 19.69 32.5 A 35 35 0 0 1 39.18 16.71"
        fill="none" stroke="#ffffff" stroke-opacity="0.35" stroke-width="10" stroke-linecap="round"/>
</svg>
